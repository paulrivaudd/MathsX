<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathsX — Calcul Mental</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MathsX">
<style>
  :root {
    --bg: #000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --text: #f5f5f7;
    --muted: #86868b;
    --green: #30d158;
    --red: #ff453a;
    --orange: #ff9f0a;
    --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
  .screen {
    width: 100%;
    max-width: 440px;
    animation: fadeIn .35s cubic-bezier(.25,.1,.25,1);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
  }
  .hidden { display: none; }

  .step-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    min-height: 32px;
  }
  .back {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 4px 8px 4px 0;
    visibility: hidden;
  }
  .back.visible { visibility: visible; }
  .back:hover { color: var(--text); }
  .dots { display: flex; gap: 6px; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--surface2);
    transition: background .25s;
  }
  .dot.active { background: var(--text); }

  .step-title {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -.02em;
    margin: 18px 0 4px;
  }
  .step-sub {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 28px;
  }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: none;
    color: var(--text);
    padding: 18px 22px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 1.1rem;
    font-weight: 500;
    text-align: left;
    transition: background .15s, transform .1s;
  }
  .choice:hover { background: var(--surface2); }
  .choice:active { transform: scale(.98); }
  .choice .sym {
    color: var(--muted);
    font-size: 1.2rem;
    font-family: "SF Mono", ui-monospace, Consolas, monospace;
  }
  .stats-link {
    display: block;
    margin: 26px auto 0;
    background: none;
    border: none;
    color: var(--muted);
    font-size: .95rem;
    cursor: pointer;
  }
  .stats-link:hover { color: var(--text); }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    font-size: .95rem;
    color: var(--muted);
  }
  .hud > span { min-width: 90px; }
  .hud > span:last-child { text-align: right; }
  .hud .timer {
    font-variant-numeric: tabular-nums;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }
  .hud .timer.danger { color: var(--red); animation: pulse .5s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: .5; } }
  .hearts { letter-spacing: 2px; }
  .hearts .on { color: var(--red); }
  .hearts .off { color: var(--surface2); }

  .streak {
    text-align: center;
    min-height: 1.5em;
    font-weight: 700;
    font-size: 1rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .streak.show { animation: pop .25s cubic-bezier(.25,.1,.25,1); }
  .streak.warm { color: var(--orange); font-size: 1.1rem; }
  .streak.hot { color: var(--red); font-size: 1.2rem; }
  @keyframes pop { from { transform: scale(1.35); } to { transform: scale(1); } }

  .calc {
    font-family: "SF Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
    font-size: clamp(2rem, 8.5vw, 3.4rem);
    font-weight: 500;
    text-align: center;
    margin: 14px 0 22px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.01em;
    transition: opacity .2s;
  }
  .calc.fade { opacity: 0; }

  #answer {
    width: 100%;
    max-width: 280px;
    height: 62px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "SF Mono", ui-monospace, Consolas, monospace;
    font-size: 1.5rem;
    background: var(--surface);
    border: 1.5px solid transparent;
    border-radius: var(--radius);
    color: var(--text);
    font-variant-numeric: tabular-nums;
    transition: border-color .15s, box-shadow .3s;
  }
  #answer.correct {
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(48,209,88,.25);
  }
  #answer.wrong {
    border-color: var(--red);
    box-shadow: 0 0 20px rgba(255,69,58,.25);
  }

  .feedback {
    text-align: center;
    min-height: 1.5em;
    margin-top: 12px;
    font-size: 1rem;
    font-weight: 500;
  }
  .feedback.good { color: var(--green); }
  .feedback.bad { color: var(--red); }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    max-width: 300px;
    margin: 14px auto 0;
  }
  .numpad button {
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 1.45rem;
    font-weight: 500;
    padding: 14px 0;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .12s, transform .08s;
  }
  .numpad button:hover { background: var(--surface2); }
  .numpad button:active { transform: scale(.93); background: var(--surface2); }
  .numpad .fn { color: var(--muted); font-size: 1.25rem; }

  .quit {
    display: block;
    margin: 22px auto 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: .9rem;
  }
  .quit:hover { color: var(--text); }

  .end-title {
    text-align: center;
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -.02em;
  }
  .end-context {
    text-align: center;
    color: var(--muted);
    margin-top: 6px;
    font-size: .95rem;
  }
  .stats {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 8px 22px;
    margin-top: 28px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--surface2);
    font-size: 1rem;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-row span:first-child { color: var(--muted); }
  .stat-row .value {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .record {
    text-align: center;
    margin-top: 18px;
    font-weight: 500;
    color: var(--muted);
    min-height: 1.4em;
  }
  .record.new { color: var(--text); }
  .btn {
    display: block;
    width: 100%;
    margin-top: 26px;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    background: var(--text);
    color: #000;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.98); }
  .btn.secondary {
    background: var(--surface);
    color: var(--text);
    margin-top: 12px;
  }
  .btn.secondary:hover { background: var(--surface2); opacity: 1; }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 22px 0 6px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 8px;
    text-align: center;
  }
  .card .big { font-size: 1.45rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .card .lbl { color: var(--muted); font-size: .72rem; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .section-lbl {
    color: var(--muted);
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin: 26px 0 10px;
  }
  .op-row { margin: 14px 0; }
  .op-head {
    display: flex;
    justify-content: space-between;
    font-size: .92rem;
    margin-bottom: 7px;
  }
  .op-head .meta { color: var(--muted); font-variant-numeric: tabular-nums; }
  .bar { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
  .bar i { display: block; height: 100%; background: var(--text); border-radius: 3px; transition: width .5s ease; }
  .hist-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--surface);
    font-size: .9rem;
  }
  .hist-row:last-child { border-bottom: none; }
  .hist-row .what { color: var(--text); }
  .hist-row .res { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .empty-msg { color: var(--muted); text-align: center; margin-top: 40px; }
</style>
</head>
<body>

<div id="setup" class="screen">
  <div class="step-header">
    <button class="back" id="backBtn">‹ Retour</button>
    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div id="step-op">
    <div class="step-title">Opération</div>
    <div class="step-sub">Que voulez-vous travailler ?</div>
    <div class="choices">
      <button class="choice" data-v="add">Addition <span class="sym">+</span></button>
      <button class="choice" data-v="sub">Soustraction <span class="sym">−</span></button>
      <button class="choice" data-v="mul">Multiplication <span class="sym">×</span></button>
      <button class="choice" data-v="div">Division <span class="sym">÷</span></button>
      <button class="choice" data-v="all">Tout <span class="sym">+ − × ÷</span></button>
    </div>
    <button class="stats-link" id="statsBtn">📊 Statistiques</button>
  </div>

  <div id="step-diff" class="hidden">
    <div class="step-title">Difficulté</div>
    <div class="step-sub">Choisissez votre niveau.</div>
    <div class="choices">
      <button class="choice" data-v="easy">Easy</button>
      <button class="choice" data-v="medium">Medium</button>
      <button class="choice" data-v="hard">Hard</button>
      <button class="choice" data-v="goat">GOAT <span class="sym">🐐</span></button>
    </div>
  </div>

  <div id="step-mode" class="hidden">
    <div class="step-title">Mode</div>
    <div class="step-sub">Comment voulez-vous jouer ?</div>
    <div class="choices">
      <button class="choice" data-v="classic">Classique <span class="sym">10 questions</span></button>
      <button class="choice" data-v="timed">Contre-la-montre <span class="sym">60 s</span></button>
      <button class="choice" data-v="survival">Survie <span class="sym">3 vies</span></button>
    </div>
  </div>
</div>

<div id="game" class="screen hidden">
  <div class="hud">
    <span id="progress"></span>
    <span class="timer" id="timer"></span>
    <span id="score"></span>
  </div>
  <div class="streak" id="streak"></div>
  <div class="calc" id="calc"></div>
  <div id="answer"></div>
  <div class="feedback" id="feedback"></div>
  <div class="numpad" id="numpad">
    <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
    <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
    <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
    <button data-k="ok" class="fn">✓</button><button data-k="0">0</button><button data-k="back" class="fn">⌫</button>
  </div>
  <button class="quit" id="quitBtn">Abandonner</button>
</div>

<div id="end" class="screen hidden">
  <div class="end-title" id="endTitle"></div>
  <div class="end-context" id="endContext"></div>
  <div class="stats" id="endStats"></div>
  <div class="record" id="recordMsg"></div>
  <button class="btn" id="replayBtn">Rejouer</button>
  <button class="btn secondary" id="homeBtn">Changer de mode</button>
</div>

<div id="statsScreen" class="screen hidden">
  <div class="step-header">
    <button class="back visible" id="statsBack">‹ Retour</button>
  </div>
  <div class="step-title">Statistiques</div>
  <div id="statsBody"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const OP_SYMBOLS = { add: '+', sub: '−', mul: '×', div: '÷' };
const OP_NAMES = { add: 'Addition', sub: 'Soustraction', mul: 'Multiplication', div: 'Division', all: 'Tout' };
const DIFF_NAMES = { easy: 'Easy', medium: 'Medium', hard: 'Hard', goat: 'GOAT' };
const MODE_NAMES = { classic: 'Classique', timed: 'Contre-la-montre', survival: 'Survie' };
const DIFF_ORDER = ['easy', 'medium', 'hard', 'goat'];
const CLASSIC_TOTAL = 10;
const TIMED_DURATION = 60;
const SURVIVAL_LIVES = 3;
const RAMP_EVERY = 5;
const LS_BEST = 'mathsx-best';
const LS_HIST = 'mathsx-history';

function lsLoad(key, fallback) {
  try {
    const v = JSON.parse(localStorage.getItem(key));
    return v === null || v === undefined ? fallback : v;
  } catch { return fallback; }
}
function lsSave(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

const config = { op: null, diff: null, mode: null };
const bestScores = lsLoad(LS_BEST, {});
let gameHistory = lsLoad(LS_HIST, []);

let state = null;
let step = 0;
const steps = ['step-op', 'step-diff', 'step-mode'];

function showStep(i) {
  step = i;
  steps.forEach((id, k) => $(id).classList.toggle('hidden', k !== i));
  document.querySelectorAll('.dot').forEach((d, k) => d.classList.toggle('active', k <= i));
  $('backBtn').classList.toggle('visible', i > 0);
}

$('backBtn').addEventListener('click', () => showStep(step - 1));

$('step-op').addEventListener('click', e => {
  const btn = e.target.closest('.choice');
  if (!btn) return;
  config.op = btn.dataset.v;
  showStep(1);
});
$('step-diff').addEventListener('click', e => {
  const btn = e.target.closest('.choice');
  if (!btn) return;
  config.diff = btn.dataset.v;
  showStep(2);
});
$('step-mode').addEventListener('click', e => {
  const btn = e.target.closest('.choice');
  if (!btn) return;
  config.mode = btn.dataset.v;
  startGame();
});

function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function generateQuestion(op, diff) {
  if (op === 'all') op = ['add', 'sub', 'mul', 'div'][rand(0, 3)];
  let a, b, answer;
  if (op === 'add' || op === 'sub') {
    const ranges = { easy: [2, 20], medium: [10, 99], hard: [100, 999], goat: [1000, 99999] };
    const [lo, hi] = ranges[diff];
    a = rand(lo, hi);
    b = rand(lo, hi);
    if (op === 'sub' && b > a) [a, b] = [b, a];
    answer = op === 'add' ? a + b : a - b;
  } else if (op === 'mul') {
    if (diff === 'easy') { a = rand(2, 10); b = rand(2, 10); }
    else if (diff === 'medium') { a = rand(10, 99); b = rand(2, 9); }
    else if (diff === 'hard') { a = rand(10, 99); b = rand(10, 99); }
    else { a = rand(100, 9999); b = rand(10, 99); }
    answer = a * b;
  } else {
    let q, d;
    if (diff === 'easy') { q = rand(2, 10); d = rand(2, 10); }
    else if (diff === 'medium') { q = rand(2, 20); d = rand(2, 12); }
    else if (diff === 'hard') { q = rand(10, 99); d = rand(2, 20); }
    else { q = rand(100, 999); d = rand(11, 99); }
    a = q * d;
    b = d;
    answer = q;
  }
  return { a, b, op, answer, key: `${a}${op}${b}` };
}

function currentDiff() {
  return config.mode === 'survival' ? DIFF_ORDER[state.diffIndex] : config.diff;
}

function renderAnswer() {
  $('answer').textContent = state ? state.value : '';
}

function renderStreak() {
  const el = $('streak');
  const s = state ? state.streak : 0;
  if (s >= 2) {
    el.textContent = '🔥 ' + s;
    el.className = 'streak show' + (s >= 10 ? ' hot' : s >= 5 ? ' warm' : '');
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  } else {
    el.textContent = '';
    el.className = 'streak';
  }
}

function renderProgress() {
  if (config.mode === 'classic') {
    $('progress').textContent = `${Math.min(state.questionNum + 1, CLASSIC_TOTAL)}/${CLASSIC_TOTAL}`;
  } else if (config.mode === 'timed') {
    $('progress').textContent = 'Contre-la-montre';
  } else {
    const hearts = '<span class="on">' + '♥'.repeat(state.lives) + '</span><span class="off">' + '♥'.repeat(SURVIVAL_LIVES - state.lives) + '</span>';
    $('progress').innerHTML = `<span class="hearts">${hearts}</span> · ${DIFF_NAMES[currentDiff()]}`;
  }
}

function nextQuestion() {
  let q, tries = 0;
  do {
    q = generateQuestion(config.op, currentDiff());
    tries++;
  } while (state.asked.has(q.key) && tries < 100);
  state.asked.add(q.key);
  state.current = q;
  state.value = '';
  state.qStart = Date.now();

  const calcEl = $('calc');
  calcEl.classList.add('fade');
  setTimeout(() => {
    calcEl.textContent = `${q.a} ${OP_SYMBOLS[q.op]} ${q.b}`;
    calcEl.classList.remove('fade');
  }, 150);

  renderAnswer();
  $('answer').className = '';
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  renderProgress();
}

function updateScore() {
  $('score').textContent = `Score ${state.correct}`;
}

function formatTime(s) {
  return s.toFixed(1) + 's';
}

function startGame() {
  state = {
    correct: 0,
    attempts: 0,
    questionNum: 0,
    asked: new Set(),
    current: null,
    value: '',
    startTime: Date.now(),
    timeLeft: TIMED_DURATION,
    interval: null,
    locked: false,
    streak: 0,
    bestStreak: 0,
    lives: SURVIVAL_LIVES,
    diffIndex: DIFF_ORDER.indexOf(config.diff),
    perOp: {},
    qStart: 0,
  };

  $('setup').classList.add('hidden');
  $('end').classList.add('hidden');
  $('game').classList.remove('hidden');
  updateScore();
  renderStreak();

  const timerEl = $('timer');
  timerEl.className = 'timer';

  if (config.mode === 'timed') {
    timerEl.textContent = TIMED_DURATION + 's';
    state.interval = setInterval(() => {
      const left = TIMED_DURATION - (Date.now() - state.startTime) / 1000;
      state.timeLeft = left;
      if (left <= 0) {
        timerEl.textContent = '0s';
        endGame();
        return;
      }
      timerEl.textContent = Math.ceil(left) + 's';
      timerEl.classList.toggle('danger', left < 10);
    }, 100);
  } else {
    timerEl.textContent = '0.0s';
    state.interval = setInterval(() => {
      timerEl.textContent = formatTime((Date.now() - state.startTime) / 1000);
    }, 100);
  }

  nextQuestion();
}

function pressDigit(d) {
  if (!state || state.locked || !state.current) return;
  if (state.value.length >= 7) return;
  state.value += d;
  renderAnswer();
  if (state.value.length >= String(state.current.answer).length) submitAnswer();
}

function pressBackspace() {
  if (!state || state.locked) return;
  state.value = state.value.slice(0, -1);
  renderAnswer();
}

function submitAnswer() {
  if (!state || state.locked || state.value === '') return;

  state.locked = true;
  state.attempts++;

  const dt = (Date.now() - state.qStart) / 1000;
  const po = state.perOp[state.current.op] || (state.perOp[state.current.op] = [0, 0, 0]);
  po[1]++;
  po[2] += dt;

  const fb = $('feedback');
  const good = parseInt(state.value, 10) === state.current.answer;
  if (good) {
    state.correct++;
    po[0]++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    $('answer').classList.add('correct');
    fb.textContent = 'Correct !';
    fb.classList.add('good');
    if (config.mode === 'survival' && state.correct % RAMP_EVERY === 0 && state.diffIndex < DIFF_ORDER.length - 1) {
      state.diffIndex++;
    }
  } else {
    state.streak = 0;
    $('answer').classList.add('wrong');
    fb.textContent = `Faux — la réponse était ${state.current.answer}`;
    fb.classList.add('bad');
    if (config.mode === 'survival') {
      state.lives--;
      renderProgress();
    }
  }
  updateScore();
  renderStreak();

  state.questionNum++;
  const delay = config.mode === 'classic' ? 1000
    : config.mode === 'timed' ? 500
    : good ? 500 : 1200;

  setTimeout(() => {
    if (!state) return;
    state.locked = false;
    if (config.mode === 'classic' && state.questionNum >= CLASSIC_TOTAL) {
      endGame();
    } else if (config.mode === 'timed' && state.timeLeft <= 0) {
      endGame();
    } else if (config.mode === 'survival' && state.lives <= 0) {
      endGame();
    } else {
      nextQuestion();
    }
  }, delay);
}

function endGame() {
  clearInterval(state.interval);
  const elapsed = (Date.now() - state.startTime) / 1000;
  const { correct, attempts, bestStreak, perOp } = state;
  const accuracy = attempts ? Math.round((correct / attempts) * 100) : 0;

  gameHistory.push({
    d: Date.now(),
    mode: config.mode, op: config.op, diff: config.diff,
    c: correct, a: attempts, t: +elapsed.toFixed(1), bs: bestStreak, po: perOp,
  });
  gameHistory = gameHistory.slice(-300);
  lsSave(LS_HIST, gameHistory);

  const key = `${config.mode}|${config.op}|${config.diff}`;
  let isRecord = false;

  const rows = [];
  if (config.mode === 'classic') {
    rows.push(['Score', `${correct}/${CLASSIC_TOTAL}`]);
    rows.push(['Précision', accuracy + '%']);
    rows.push(['Meilleure série', bestStreak]);
    rows.push(['Temps total', formatTime(elapsed)]);
    rows.push(['Temps moyen / question', formatTime(elapsed / CLASSIC_TOTAL)]);
    const prev = bestScores[key];
    if (!prev || correct > prev.score || (correct === prev.score && elapsed < prev.time)) {
      bestScores[key] = { score: correct, time: +elapsed.toFixed(1) };
      isRecord = true;
    }
    $('recordMsg').textContent = isRecord
      ? '🏆 Nouveau record !'
      : `Record : ${bestScores[key].score}/${CLASSIC_TOTAL} en ${formatTime(bestScores[key].time)}`;
  } else {
    rows.push(['Bonnes réponses', correct]);
    rows.push(['Précision', accuracy + '%']);
    rows.push(['Meilleure série', bestStreak]);
    if (config.mode === 'survival') rows.push(['Temps total', formatTime(elapsed)]);
    const prev = bestScores[key];
    if (!prev || correct > prev.score) {
      bestScores[key] = { score: correct };
      isRecord = true;
    }
    $('recordMsg').textContent = isRecord
      ? '🏆 Nouveau record !'
      : `Record : ${bestScores[key].score} bonnes réponses`;
  }
  lsSave(LS_BEST, bestScores);
  $('recordMsg').classList.toggle('new', isRecord);

  $('endStats').innerHTML = rows
    .map(([l, v]) => `<div class="stat-row"><span>${l}</span><span class="value">${v}</span></div>`)
    .join('');
  $('endTitle').textContent = config.mode === 'timed' ? 'Temps écoulé' : 'Partie terminée';
  $('endContext').textContent = `${MODE_NAMES[config.mode]} · ${OP_NAMES[config.op]} · ${DIFF_NAMES[config.diff]}`;

  state = null;
  $('game').classList.add('hidden');
  $('end').classList.remove('hidden');
}

function quitGame() {
  clearInterval(state.interval);
  state = null;
  $('game').classList.add('hidden');
  $('setup').classList.remove('hidden');
  showStep(0);
}

function buildStats() {
  const body = $('statsBody');
  if (!gameHistory.length) {
    body.innerHTML = '<div class="empty-msg">Aucune partie enregistrée pour l\'instant.<br>Jouez une partie pour voir vos statistiques !</div>';
    return;
  }

  const games = gameHistory.length;
  let totalC = 0, totalA = 0, bestStreakEver = 0;
  const agg = {};
  gameHistory.forEach(h => {
    totalC += h.c;
    totalA += h.a;
    if (h.bs > bestStreakEver) bestStreakEver = h.bs;
    for (const op in (h.po || {})) {
      const [c, a, t] = h.po[op];
      const g = agg[op] || (agg[op] = { c: 0, a: 0, t: 0 });
      g.c += c; g.a += a; g.t += t;
    }
  });
  const globalAcc = totalA ? Math.round((totalC / totalA) * 100) : 0;

  let html = `
    <div class="cards">
      <div class="card"><div class="big">${games}</div><div class="lbl">Parties</div></div>
      <div class="card"><div class="big">${globalAcc}%</div><div class="lbl">Précision</div></div>
      <div class="card"><div class="big">🔥 ${bestStreakEver}</div><div class="lbl">Série max</div></div>
    </div>`;

  html += '<div class="section-lbl">Par opération</div>';
  ['add', 'sub', 'mul', 'div'].forEach(op => {
    const g = agg[op];
    if (!g || !g.a) return;
    const acc = Math.round((g.c / g.a) * 100);
    const avg = (g.t / g.a).toFixed(1);
    html += `
      <div class="op-row">
        <div class="op-head">
          <span>${OP_NAMES[op]}</span>
          <span class="meta">${acc}% · ${avg}s / question</span>
        </div>
        <div class="bar"><i style="width:${acc}%"></i></div>
      </div>`;
  });

  html += '<div class="section-lbl">Dernières parties</div>';
  gameHistory.slice(-8).reverse().forEach(h => {
    const date = new Date(h.d).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
    const score = h.mode === 'classic' ? `${h.c}/${CLASSIC_TOTAL}` : `${h.c} pts`;
    html += `
      <div class="hist-row">
        <span class="what">${MODE_NAMES[h.mode]} · ${OP_NAMES[h.op]} · ${DIFF_NAMES[h.diff]}</span>
        <span class="res">${score} · ${date}</span>
      </div>`;
  });

  body.innerHTML = html;
}

$('quitBtn').addEventListener('click', quitGame);
$('replayBtn').addEventListener('click', startGame);
$('homeBtn').addEventListener('click', () => {
  $('end').classList.add('hidden');
  $('setup').classList.remove('hidden');
  showStep(0);
});
$('statsBtn').addEventListener('click', () => {
  buildStats();
  $('setup').classList.add('hidden');
  $('statsScreen').classList.remove('hidden');
});
$('statsBack').addEventListener('click', () => {
  $('statsScreen').classList.add('hidden');
  $('setup').classList.remove('hidden');
});

$('numpad').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const k = btn.dataset.k;
  if (k === 'back') pressBackspace();
  else if (k === 'ok') submitAnswer();
  else pressDigit(k);
});

document.addEventListener('keydown', e => {
  if ($('game').classList.contains('hidden') || !state) return;
  if (e.key >= '0' && e.key <= '9') pressDigit(e.key);
  else if (e.key === 'Backspace') pressBackspace();
  else if (e.key === 'Enter') submitAnswer();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
