<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathsX — Calcul Mental</title>
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MathsX">
<style>
  :root {
    --bg: #000;
    --surface: #1c1c1e;
    --surface2: #2c2c2e;
    --text: #f5f5f7;
    --muted: #86868b;
    --green: #30d158;
    --red: #ff453a;
    --orange: #ff9f0a;
    --radius: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  button { -webkit-tap-highlight-color: transparent; touch-action: manipulation; user-select: none; }
  .screen {
    width: 100%;
    max-width: 440px;
    animation: fadeIn .35s cubic-bezier(.25,.1,.25,1);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
  }
  .hidden { display: none; }

  .step-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    min-height: 32px;
  }
  .back {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    padding: 4px 8px 4px 0;
    visibility: hidden;
  }
  .back.visible { visibility: visible; }
  .back:hover { color: var(--text); }
  .dots { display: flex; gap: 6px; }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--surface2);
    transition: background .25s;
  }
  .dot.active { background: var(--text); }

  .step-title {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: -.02em;
    margin: 18px 0 4px;
  }
  .step-sub {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 28px;
  }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: none;
    color: var(--text);
    padding: 16px 22px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 1.08rem;
    font-weight: 500;
    text-align: left;
    transition: background .15s, transform .1s;
  }
  .choice:hover { background: var(--surface2); }
  .choice:active { transform: scale(.98); }
  .choice .sym {
    color: var(--muted);
    font-size: 1.1rem;
    font-family: "SF Mono", ui-monospace, Consolas, monospace;
  }
  .links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px 22px;
    margin-top: 26px;
  }
  .stats-link {
    background: none;
    border: none;
    color: var(--muted);
    font-size: .95rem;
    cursor: pointer;
  }
  .stats-link:hover { color: var(--text); }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
    font-size: .95rem;
    color: var(--muted);
  }
  .hud > span { min-width: 90px; }
  .hud > span:last-child { text-align: right; }
  .hud .timer {
    font-variant-numeric: tabular-nums;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }
  .hud .timer.danger { color: var(--red); animation: pulse .5s infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: .5; } }
  .hearts { letter-spacing: 2px; }
  .hearts .on { color: var(--red); }
  .hearts .off { color: var(--surface2); }

  .streak {
    text-align: center;
    min-height: 1.5em;
    font-weight: 700;
    font-size: 1rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .streak.show { animation: pop .25s cubic-bezier(.25,.1,.25,1); }
  .streak.warm { color: var(--orange); font-size: 1.1rem; }
  .streak.hot { color: var(--red); font-size: 1.2rem; }
  @keyframes pop { from { transform: scale(1.35); } to { transform: scale(1); } }

  .calc {
    font-family: "SF Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
    font-size: clamp(2rem, 8.5vw, 3.4rem);
    font-weight: 500;
    text-align: center;
    margin: 14px 0 22px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.01em;
    transition: opacity .2s;
  }
  .calc.fade { opacity: 0; }
  .calc.seq { font-size: clamp(1.35rem, 6vw, 2.1rem); }

  #answer {
    width: 100%;
    max-width: 280px;
    height: 62px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "SF Mono", ui-monospace, Consolas, monospace;
    font-size: 1.5rem;
    background: var(--surface);
    border: 1.5px solid transparent;
    border-radius: var(--radius);
    color: var(--text);
    font-variant-numeric: tabular-nums;
    transition: border-color .15s, box-shadow .3s;
  }
  #answer.correct {
    border-color: var(--green);
    box-shadow: 0 0 20px rgba(48,209,88,.25);
  }
  #answer.wrong {
    border-color: var(--red);
    box-shadow: 0 0 20px rgba(255,69,58,.25);
  }

  .feedback {
    text-align: center;
    min-height: 1.5em;
    margin-top: 12px;
    font-size: 1rem;
    font-weight: 500;
  }
  .feedback.good { color: var(--green); }
  .feedback.bad { color: var(--red); }
  .feedback.info { color: var(--muted); font-weight: 400; }

  .numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 9px;
    max-width: 300px;
    margin: 14px auto 0;
  }
  .numpad button {
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: inherit;
    font-size: 1.45rem;
    font-weight: 500;
    padding: 14px 0;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background .12s, transform .08s;
  }
  .numpad button:hover { background: var(--surface2); }
  .numpad button:active { transform: scale(.93); background: var(--surface2); }
  .numpad .fn { color: var(--muted); font-size: 1.25rem; }

  .quit {
    display: block;
    margin: 22px auto 0;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: .9rem;
  }
  .quit:hover { color: var(--text); }

  .end-title {
    text-align: center;
    font-size: 1.9rem;
    font-weight: 700;
    letter-spacing: -.02em;
  }
  .end-context {
    text-align: center;
    color: var(--muted);
    margin-top: 6px;
    font-size: .95rem;
  }
  .stats {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 8px 22px;
    margin-top: 28px;
  }
  .stat-row {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--surface2);
    font-size: 1rem;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-row span:first-child { color: var(--muted); }
  .stat-row .value {
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .record {
    text-align: center;
    margin-top: 18px;
    font-weight: 500;
    color: var(--muted);
    min-height: 1.4em;
  }
  .record.new { color: var(--text); }
  .btn {
    display: block;
    width: 100%;
    margin-top: 26px;
    padding: 16px;
    border: none;
    border-radius: var(--radius);
    background: var(--text);
    color: #000;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  .btn:hover { opacity: .85; }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.secondary {
    background: var(--surface);
    color: var(--text);
    margin-top: 12px;
  }
  .btn.secondary:hover { background: var(--surface2); opacity: 1; }

  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 22px 0 6px;
  }
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 8px;
    text-align: center;
  }
  .card .big { font-size: 1.45rem; font-weight: 700; font-variant-numeric: tabular-nums; }
  .card .lbl { color: var(--muted); font-size: .72rem; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
  .section-lbl {
    color: var(--muted);
    font-size: .8rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin: 26px 0 10px;
  }
  .op-row { margin: 14px 0; }
  .op-head {
    display: flex;
    justify-content: space-between;
    font-size: .92rem;
    margin-bottom: 7px;
  }
  .op-head .meta { color: var(--muted); font-variant-numeric: tabular-nums; }
  .bar { height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
  .bar i { display: block; height: 100%; background: var(--text); border-radius: 3px; transition: width .5s ease; }
  .hist-row {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--surface);
    font-size: .9rem;
  }
  .hist-row:last-child { border-bottom: none; }
  .hist-row .what { color: var(--text); }
  .hist-row .res { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .empty-msg { color: var(--muted); text-align: center; margin-top: 40px; line-height: 1.5; }

  #pseudoInput {
    width: 100%;
    padding: 16px;
    font-size: 1.2rem;
    text-align: center;
    background: var(--surface);
    border: 1.5px solid transparent;
    border-radius: var(--radius);
    color: var(--text);
    outline: none;
    font-family: inherit;
  }
  #pseudoInput:focus { border-color: var(--muted); }

  .board-filters { display: flex; gap: 8px; margin: 18px 0 8px; }
  .board-filters select {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    color: var(--text);
    border: none;
    border-radius: 12px;
    padding: 10px 6px;
    font-size: .88rem;
    font-family: inherit;
    -webkit-appearance: none;
    appearance: none;
    text-align: center;
    cursor: pointer;
  }
  .board-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 8px;
    border-bottom: 1px solid var(--surface);
    font-size: .95rem;
  }
  .board-row:last-child { border-bottom: none; }
  .board-row .rank { width: 34px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .board-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board-row .pts { color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .board-row.me { background: var(--surface); border-radius: 12px; border-bottom: none; }
  .board-row.me .name { font-weight: 700; }
  .board-row.click { cursor: pointer; }
  .board-row.click:hover { background: var(--surface2); border-radius: 12px; }

  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
    margin-top: 18px;
  }
  .tab {
    flex: 1;
    padding: 9px;
    border-radius: 9px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: .92rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .tab.active { background: var(--surface2); color: var(--text); }
  #playerSearch {
    width: 100%;
    padding: 12px 16px;
    margin: 14px 0 8px;
    background: var(--surface);
    border: 1.5px solid transparent;
    border-radius: 12px;
    color: var(--text);
    font-size: .95rem;
    font-family: inherit;
    outline: none;
  }
  #playerSearch:focus { border-color: var(--muted); }
</style>
</head>
<body>

<div id="setup" class="screen">
  <div class="step-header">
    <button class="back" id="backBtn">‹ Retour</button>
    <div class="dots">
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div id="step-op">
    <div class="step-title">Épreuve</div>
    <div class="step-sub">Que voulez-vous travailler ?</div>
    <div class="choices">
      <button class="choice" data-v="add">Addition <span class="sym">+</span></button>
      <button class="choice" data-v="sub">Soustraction <span class="sym">−</span></button>
      <button class="choice" data-v="mul">Multiplication <span class="sym">×</span></button>
      <button class="choice" data-v="div">Division <span class="sym">÷</span></button>
      <button class="choice" data-v="all">Tout <span class="sym">+ − × ÷</span></button>
      <button class="choice" data-v="chain">Cascade <span class="sym">5 → ×3 → −8</span></button>
      <button class="choice" data-v="seq">Suites logiques <span class="sym">2, 5, 8, ?</span></button>
    </div>
    <div class="links">
      <button class="stats-link" id="statsBtn">📊 Statistiques</button>
      <button class="stats-link" id="boardBtn">🏆 Classement</button>
      <button class="stats-link" id="profileBtn">👤 Profil</button>
    </div>
  </div>

  <div id="step-diff" class="hidden">
    <div class="step-title">Difficulté</div>
    <div class="step-sub">Choisissez votre niveau.</div>
    <div class="choices">
      <button class="choice" data-v="easy">Easy</button>
      <button class="choice" data-v="medium">Medium</button>
      <button class="choice" data-v="hard">Hard</button>
      <button class="choice" data-v="goat">GOAT <span class="sym">🐐</span></button>
    </div>
  </div>

  <div id="step-mode" class="hidden">
    <div class="step-title">Mode</div>
    <div class="step-sub">Comment voulez-vous jouer ?</div>
    <div class="choices">
      <button class="choice" data-v="classic">Classique <span class="sym">10 questions</span></button>
      <button class="choice" data-v="timed">Contre-la-montre <span class="sym">60 s</span></button>
      <button class="choice" data-v="survival">Survie <span class="sym">3 vies · chrono</span></button>
    </div>
  </div>
</div>

<div id="game" class="screen hidden">
  <div class="hud">
    <span id="progress"></span>
    <span class="timer" id="timer"></span>
    <span id="score"></span>
  </div>
  <div class="streak" id="streak"></div>
  <div class="calc" id="calc"></div>
  <div id="answer"></div>
  <div class="feedback" id="feedback"></div>
  <div class="numpad" id="numpad">
    <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
    <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
    <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
    <button data-k="ok" class="fn">✓</button><button data-k="0">0</button><button data-k="back" class="fn">⌫</button>
  </div>
  <button class="quit" id="quitBtn">Abandonner</button>
</div>

<div id="end" class="screen hidden">
  <div class="end-title" id="endTitle"></div>
  <div class="end-context" id="endContext"></div>
  <div class="stats" id="endStats"></div>
  <div class="record" id="recordMsg"></div>
  <button class="btn" id="replayBtn">Rejouer</button>
  <button class="btn secondary" id="endBoardBtn">🏆 Voir le classement</button>
  <button class="btn secondary" id="homeBtn">Changer de mode</button>
</div>

<div id="statsScreen" class="screen hidden">
  <div class="step-header">
    <button class="back visible" id="statsBack">‹ Retour</button>
  </div>
  <div class="step-title">Statistiques</div>
  <div id="statsBody"></div>
</div>

<div id="pseudoScreen" class="screen hidden">
  <div class="step-title" id="pseudoTitle">Bienvenue 👋</div>
  <div class="step-sub">Choisissez un pseudo pour apparaître dans le classement en ligne.</div>
  <input id="pseudoInput" maxlength="16" placeholder="Votre pseudo" autocomplete="off">
  <div class="feedback" id="pseudoMsg"></div>
  <button class="btn" id="pseudoBtn">C'est parti</button>
  <button class="btn secondary hidden" id="pseudoCancel">Annuler</button>
</div>

<div id="profileScreen" class="screen hidden">
  <div class="step-header">
    <button class="back visible" id="profileBack">‹ Retour</button>
  </div>
  <div class="step-title">Profils</div>
  <div class="step-sub">Chaque profil a son pseudo, ses records et ses statistiques.</div>
  <div class="choices" id="profileList"></div>
  <div class="feedback" id="profileMsg"></div>
  <button class="btn secondary" id="addProfileBtn">＋ Nouveau profil</button>
</div>

<div id="boardScreen" class="screen hidden">
  <div class="step-header">
    <button class="back visible" id="boardBack">‹ Retour</button>
  </div>
  <div class="step-title">Classement</div>
  <div class="tabs">
    <button class="tab active" id="tabGeneral">Général</button>
    <button class="tab" id="tabCat">Par épreuve</button>
  </div>
  <div id="generalPane">
    <input id="playerSearch" placeholder="Rechercher un joueur…" autocomplete="off">
    <div id="generalBody"></div>
  </div>
  <div id="catPane" class="hidden">
    <div class="board-filters">
      <select id="bMode">
        <option value="classic">Classique</option>
        <option value="timed">Contre-la-montre</option>
        <option value="survival">Survie</option>
      </select>
      <select id="bOp">
        <option value="add">Addition</option>
        <option value="sub">Soustraction</option>
        <option value="mul">Multiplication</option>
        <option value="div">Division</option>
        <option value="all">Tout</option>
        <option value="chain">Cascade</option>
        <option value="seq">Suites</option>
      </select>
      <select id="bDiff">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
        <option value="goat">GOAT</option>
      </select>
    </div>
    <div id="boardBody"></div>
  </div>
</div>

<div id="playerScreen" class="screen hidden">
  <div class="step-header">
    <button class="back visible" id="playerBack">‹ Retour</button>
  </div>
  <div class="step-title" id="playerName"></div>
  <div class="step-sub" id="playerSub"></div>
  <div id="playerBody"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const $ = id => document.getElementById(id);
const OP_SYMBOLS = { add: '+', sub: '−', mul: '×', div: '÷' };
const OP_NAMES = { add: 'Addition', sub: 'Soustraction', mul: 'Multiplication', div: 'Division', all: 'Tout', chain: 'Cascade', seq: 'Suites' };
const DIFF_NAMES = { easy: 'Easy', medium: 'Medium', hard: 'Hard', goat: 'GOAT' };
const MODE_NAMES = { classic: 'Classique', timed: 'Contre-la-montre', survival: 'Survie' };
const DIFF_ORDER = ['easy', 'medium', 'hard', 'goat'];
const CLASSIC_TOTAL = 10;
const TIMED_DURATION = 60;
const SURVIVAL_LIVES = 3;
const RAMP_EVERY = 5;
const SURVIVAL_LIMITS = { easy: 8, medium: 12, hard: 20, goat: 30 };
const CHAIN_STEP_MS = { easy: 2000, medium: 3000, hard: 4500, goat: 6000 };
const LS_BEST = 'mathsx-best';
const LS_HIST = 'mathsx-history';
const LS_PSEUDO = 'mathsx-pseudo';
const LS_PROFILES = 'mathsx-profiles';
const LS_ACTIVE = 'mathsx-active';
const SUPA_URL = 'https://iefnimeznnuksyohdgqh.supabase.co';
const SUPA_KEY = 'sb_publishable_nU-jSLcbf8H3glLDcMgkAA_0JlIPJ2n';

function lsLoad(key, fallback) {
  try {
    const v = JSON.parse(localStorage.getItem(key));
    return v === null || v === undefined ? fallback : v;
  } catch { return fallback; }
}
function lsSave(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

// ---------- Profils (multi-comptes sur un même appareil) ----------

const supa = window.supabase ? window.supabase.createClient(SUPA_URL, SUPA_KEY) : null;
let myId = null;
let profileOk = false;
let suppressCapture = false;
let addingProfile = false;
let pendingSession = null;

let profiles = lsLoad(LS_PROFILES, null);
if (!Array.isArray(profiles)) {
  profiles = [];
  const legacy = localStorage.getItem(LS_PSEUDO);
  if (legacy) {
    profiles.push({ pseudo: legacy, at: null, rt: null });
    const oldBest = localStorage.getItem(LS_BEST);
    const oldHist = localStorage.getItem(LS_HIST);
    if (oldBest) localStorage.setItem(LS_BEST + '::' + legacy, oldBest);
    if (oldHist) localStorage.setItem(LS_HIST + '::' + legacy, oldHist);
    localStorage.removeItem(LS_BEST);
    localStorage.removeItem(LS_HIST);
    localStorage.removeItem(LS_PSEUDO);
    localStorage.setItem(LS_ACTIVE, legacy);
  }
  lsSave(LS_PROFILES, profiles);
}
let activeIdx = profiles.findIndex(p => p.pseudo === localStorage.getItem(LS_ACTIVE));
if (activeIdx < 0 && profiles.length) activeIdx = 0;
let pseudo = activeIdx >= 0 ? profiles[activeIdx].pseudo : '';

let bestScores = {};
let gameHistory = [];
function kBest() { return LS_BEST + '::' + pseudo; }
function kHist() { return LS_HIST + '::' + pseudo; }
function loadLocalData() {
  bestScores = lsLoad(kBest(), {});
  gameHistory = lsLoad(kHist(), []);
}
function saveProfiles() { lsSave(LS_PROFILES, profiles); }

function captureTokens(session) {
  if (suppressCapture || !session) return;
  const p = profiles[activeIdx];
  if (p) {
    p.at = session.access_token;
    p.rt = session.refresh_token;
    saveProfiles();
  }
}
if (supa) {
  supa.auth.onAuthStateChange((event, session) => {
    if (session) captureTokens(session);
  });
}

async function ensureSession() {
  if (!supa) return null;
  try {
    let { data: { session } } = await supa.auth.getSession();
    if (!session) ({ data: { session } } = await supa.auth.signInAnonymously());
    if (session) {
      myId = session.user.id;
      captureTokens(session);
    }
    return session;
  } catch { return null; }
}

async function ensureProfile() {
  if (profileOk) return true;
  if (!supa || !pseudo || !myId) return false;
  const { data } = await supa.from('profiles').select('user_id').eq('user_id', myId).maybeSingle();
  if (data) { profileOk = true; return true; }
  const { error } = await supa.from('profiles').insert({ pseudo });
  if (!error) { profileOk = true; return true; }
  if (error.code === '23505') {
    profiles.splice(activeIdx, 1);
    saveProfiles();
    activeIdx = profiles.length ? 0 : -1;
    pseudo = activeIdx >= 0 ? profiles[activeIdx].pseudo : '';
  }
  return false;
}

async function submitScore(score, timeS, attempts) {
  if (!supa || !pseudo) return;
  try {
    if (!(await ensureSession())) return;
    if (!(await ensureProfile())) return;
    const payload = {
      mode: config.mode, op: config.op, diff: config.diff,
      score, time_s: +timeS.toFixed(1), attempts,
    };
    const { error } = await supa.from('scores').insert(payload);
    if (error) {
      delete payload.attempts;
      await supa.from('scores').insert(payload);
    }
  } catch {}
}

async function switchProfile(i) {
  if (i === activeIdx || !profiles[i]) return;
  const msg = $('profileMsg');
  const p = profiles[i];
  if (!supa || !p.rt) {
    msg.textContent = 'Changement impossible pour le moment (connexion requise).';
    msg.className = 'feedback bad';
    return;
  }
  msg.textContent = 'Changement…';
  msg.className = 'feedback info';
  suppressCapture = true;
  try {
    const { data, error } = await supa.auth.setSession({ access_token: p.at || '', refresh_token: p.rt });
    if (error || !data.session) throw error || new Error('no session');
    activeIdx = i;
    pseudo = p.pseudo;
    myId = data.session.user.id;
    profileOk = true;
    suppressCapture = false;
    captureTokens(data.session);
    localStorage.setItem(LS_ACTIVE, pseudo);
    loadLocalData();
    $('profileBtn').textContent = '👤 ' + pseudo;
    msg.textContent = '';
    renderProfiles();
  } catch {
    msg.textContent = 'Session expirée pour ce profil — impossible de le charger.';
    msg.className = 'feedback bad';
  } finally {
    suppressCapture = false;
  }
}

function renderProfiles() {
  $('profileList').innerHTML = profiles.map((p, i) =>
    `<button class="choice" data-i="${i}">${esc(p.pseudo)} <span class="sym">${i === activeIdx ? '✓ actif' : ''}</span></button>`
  ).join('');
}

async function startAddProfile() {
  const msg = $('profileMsg');
  msg.textContent = '';
  if (!supa) {
    msg.textContent = 'Connexion requise pour créer un profil.';
    msg.className = 'feedback bad';
    return;
  }
  msg.textContent = 'Préparation…';
  msg.className = 'feedback info';
  try {
    await ensureSession();
    suppressCapture = true;
    await supa.auth.signOut({ scope: 'local' });
    const { data, error } = await supa.auth.signInAnonymously();
    if (error || !data.session) throw error || new Error('no session');
    pendingSession = data.session;
    addingProfile = true;
    msg.textContent = '';
    $('profileScreen').classList.add('hidden');
    $('pseudoTitle').textContent = 'Nouveau profil';
    $('pseudoCancel').classList.remove('hidden');
    $('pseudoScreen').classList.remove('hidden');
    $('pseudoInput').focus();
  } catch {
    const p = profiles[activeIdx];
    try { if (p && p.rt) await supa.auth.setSession({ access_token: p.at, refresh_token: p.rt }); } catch {}
    suppressCapture = false;
    msg.textContent = 'Impossible de créer un profil — vérifiez votre connexion.';
    msg.className = 'feedback bad';
  }
}

async function cancelAddProfile() {
  addingProfile = false;
  pendingSession = null;
  const p = profiles[activeIdx];
  try { if (supa && p && p.rt) await supa.auth.setSession({ access_token: p.at, refresh_token: p.rt }); } catch {}
  suppressCapture = false;
  $('pseudoScreen').classList.add('hidden');
  $('pseudoCancel').classList.add('hidden');
  $('profileScreen').classList.remove('hidden');
  renderProfiles();
}

async function savePseudo() {
  const input = $('pseudoInput');
  const msg = $('pseudoMsg');
  const btn = $('pseudoBtn');
  const v = input.value.trim().slice(0, 16);
  msg.textContent = '';
  msg.className = 'feedback';
  if (v.length < 2) {
    msg.textContent = 'Deux caractères minimum.';
    msg.className = 'feedback bad';
    input.focus();
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Vérification…';
  try {
    if (!supa) throw new Error('offline');
    const session = addingProfile ? pendingSession : await ensureSession();
    if (!session) throw new Error('offline');
    const { error } = await supa.from('profiles').insert({ pseudo: v });
    if (error) {
      if (error.code === '23505') {
        msg.textContent = 'Ce pseudo est déjà pris, essayez-en un autre.';
        msg.className = 'feedback bad';
        input.focus();
        return;
      }
      throw error;
    }
    profiles.push({ pseudo: v, at: session.access_token, rt: session.refresh_token });
    activeIdx = profiles.length - 1;
    pseudo = v;
    myId = session.user.id;
    profileOk = true;
    saveProfiles();
    localStorage.setItem(LS_ACTIVE, pseudo);
    loadLocalData();
    suppressCapture = false;
    addingProfile = false;
    pendingSession = null;
    input.value = '';
    $('profileBtn').textContent = '👤 ' + pseudo;
    $('pseudoScreen').classList.add('hidden');
    $('pseudoCancel').classList.add('hidden');
    $('setup').classList.remove('hidden');
    showStep(0);
  } catch {
    msg.textContent = 'Connexion impossible — vérifiez votre réseau et réessayez.';
    msg.className = 'feedback bad';
  } finally {
    btn.disabled = false;
    btn.textContent = "C'est parti";
  }
}

// ---------- Navigation ----------

const config = { op: null, diff: null, mode: null };
let state = null;
let step = 0;
const steps = ['step-op', 'step-diff', 'step-mode'];

function showStep(i) {
  step = i;
  steps.forEach((id, k) => $(id).classList.toggle('hidden', k !== i));
  document.querySelectorAll('.dot').forEach((d, k) => d.classList.toggle('active', k <= i));
  $('backBtn').classList.toggle('visible', i > 0);
}

$('backBtn').addEventListener('click', () => showStep(step - 1));
$('step-op').addEventListener('click', e => {
  const btn = e.target.closest('.choice');
  if (!btn) return;
  config.op = btn.dataset.v;
  showStep(1);
});
$('step-diff').addEventListener('click', e => {

  if (!btn) return;
  config.diff = btn.dataset.v;
  showStep(2);
});
$('step-mode').addEventListener('click', e => {
  const btn = e.target.closest('.choice');
  if (!btn) return;
  config.mode = btn.dataset.v;
  startGame();
});

// ---------- Génération des questions ----------

function generateQuestion(op, diff) {
  if (op === 'chain') return genChain(diff);
  if (op === 'seq') return genSeq(diff);
  if (op === 'all') op = ['add', 'sub', 'mul', 'div'][rand(0, 3)];
  let a, b, answer;
  if (op === 'add' || op === 'sub') {
    const ranges = { easy: [2, 20], medium: [10, 99], hard: [100, 999], goat: [1000, 99999] };
    const [lo, hi] = ranges[diff];
    a = rand(lo, hi);
    b = rand(lo, hi);
    if (op === 'sub' && b > a) [a, b] = [b, a];
    answer = op === 'add' ? a + b : a - b;
  } else if (op === 'mul') {
    if (diff === 'easy') { a = rand(2, 10); b = rand(2, 10); }
    else if (diff === 'medium') { a = rand(10, 99); b = rand(2, 9); }
    else if (diff === 'hard') { a = rand(10, 99); b = rand(10, 99); }
    else { a = rand(100, 9999); b = rand(10, 99); }
    answer = a * b;
  } else {
    let q, d;
    if (diff === 'easy') { q = rand(2, 10); d = rand(2, 10); }
    else if (diff === 'medium') { q = rand(2, 20); d = rand(2, 12); }
    else if (diff === 'hard') { q = rand(10, 99); d = rand(2, 20); }
    else { q = rand(100, 999); d = rand(11, 99); }
    a = q * d;
    b = d;
    answer = q;
  }
  return { a, b, op, answer, key: `${a}${op}${b}` };
}

function genChain(diff) {
  const conf = {
    easy:   { start: [2, 9],       steps: 3, cap: 150,   addHi: 9,   mulHi: 5 },
    medium: { start: [10, 99],     steps: 4, cap: 600,   addHi: 49,  mulHi: 9 },
    hard:   { start: [100, 999],   steps: 4, cap: 4000,  addHi: 249, mulHi: 9 },
    goat:   { start: [1000, 9999], steps: 5, cap: 30000, addHi: 999, mulHi: 12 },
  }[diff];
  let v = rand(conf.start[0], conf.start[1]);
  const start = v;
  const stepsArr = [];
  for (let i = 0; i < conf.steps; i++) {
    const choices = ['add'];
    if (v >= 4) choices.push('sub');
    if (v >= 2 && v * 2 <= conf.cap) choices.push('mul');
    const divs = [];
    for (let d = 2; d <= 12; d++) if (v % d === 0 && v >= d * 2) divs.push(d);
    if (divs.length) choices.push('div', 'div');
    const op = choices[rand(0, choices.length - 1)];
    let n;
    if (op === 'add') {
      n = rand(2, conf.addHi);
      v += n;
      stepsArr.push({ sym: '+', n });
    } else if (op === 'sub') {
      n = rand(2, Math.min(conf.addHi, v - 1));
      v -= n;
      stepsArr.push({ sym: '−', n });
    } else if (op === 'mul') {
      n = rand(2, Math.max(2, Math.min(conf.mulHi, Math.floor(conf.cap / v))));
      v *= n;
      stepsArr.push({ sym: '×', n });
    } else {
      n = divs[rand(0, divs.length - 1)];
      v = v / n;
      stepsArr.push({ sym: '÷', n });
    }
  }
  return {
    op: 'chain', start, steps: stepsArr, answer: v,
    key: 'chain' + start + stepsArr.map(s => s.sym + s.n).join(''),
  };
}

function genSeq(diff) {
  const pick = arr => arr[rand(0, arr.length - 1)];
  const type = pick({
    easy:   ['arith', 'arithDown', 'geo2'],
    medium: ['arith', 'geo', 'squares', 'growStep'],
    hard:   ['affine', 'fib', 'squaresC', 'alt'],
    goat:   ['affine3', 'cubes', 'sqPlusN', 'fibx'],
  }[diff]);
  let terms = [];
  switch (type) {
    case 'arith': {
      const s = rand(1, 20), k = rand(2, diff === 'easy' ? 9 : 15);
      terms = [0, 1, 2, 3, 4].map(i => s + i * k);
      break;
    }
    case 'arithDown': {
      const k = rand(2, 9), s = rand(4 * k + 1, 4 * k + 40);
      terms = [0, 1, 2, 3, 4].map(i => s - i * k);
      break;
    }
    case 'geo2': {
      const s = rand(1, 6);
      terms = [0, 1, 2, 3, 4].map(i => s * 2 ** i);
      break;
    }
    case 'geo': {
      const r = pick([2, 3]), s = rand(2, 6);
      terms = [0, 1, 2, 3, 4].map(i => s * r ** i);
      break;
    }
    case 'squares': {
      const m = rand(1, 8);
      terms = [0, 1, 2, 3, 4].map(i => (m + i) ** 2);
      break;
    }
    case 'growStep': {
      const s = rand(1, 15), k = rand(2, 5);
      terms = [s];
      for (let i = 0; i < 4; i++) terms.push(terms[terms.length - 1] + k + i);
      break;
    }
    case 'affine': {
      const c = rand(1, 9);
      let v = rand(1, 9);
      terms = [v];
      for (let i = 0; i < 4; i++) { v = v * 2 + c; terms.push(v); }
      break;
    }
    case 'fib': {
      let a = rand(1, 9), b = rand(2, 12);
      terms = [a, b];
      for (let i = 0; i < 4; i++) { const c = a + b; terms.push(c); a = b; b = c; }
      break;
    }
    case 'squaresC': {
      const m = rand(2, 9), c = rand(2, 15);
      terms = [0, 1, 2, 3, 4].map(i => (m + i) ** 2 + c);
      break;
    }
    case 'alt': {
      const a = rand(3, 9), b = rand(11, 24);
      let v = rand(1, 20);
      terms = [v];
      for (let i = 0; i < 5; i++) { v += i % 2 === 0 ? a : b; terms.push(v); }
      break;
    }
    case 'affine3': {
      const s = rand(2, 9), c = rand(1, s);
      let v = s;
      terms = [v];
      for (let i = 0; i < 4; i++) { v = v * 3 - c; terms.push(v); }
      break;
    }
    case 'cubes': {
      const m = rand(1, 6);
      terms = [0, 1, 2, 3, 4].map(i => (m + i) ** 3);
      break;
    }
    case 'sqPlusN': {
      const m = rand(2, 9);
      terms = [0, 1, 2, 3, 4].map(i => (m + i) ** 2 + (m + i));
      break;
    }
    case 'fibx': {
      let a = rand(1, 5), b = rand(2, 7);
      terms = [a, b];
      for (let i = 0; i < 4; i++) { const c = b * 2 + a; terms.push(c); a = b; b = c; }
      break;
    }
  }
  const answer = terms[terms.length - 1];
  const shown = terms.slice(0, -1);
  return { op: 'seq', terms: shown, answer, key: 'seq' + shown.join(',') + '>' + answer };
}

// ---------- Jeu ----------

function currentDiff() {
  return config.mode === 'survival' ? DIFF_ORDER[state.diffIndex] : config.diff;
}

function questionLimit(q) {
  const base = SURVIVAL_LIMITS[currentDiff()];
  return q.op === 'seq' ? Math.round(base * 1.5) : base;
}

function setCalc(text) {
  const el = $('calc');
  el.classList.add('fade');
  setTimeout(() => {
    if (!state) return;
    el.textContent = text;
    el.classList.remove('fade');
  }, 150);
}

function renderAnswer() {
  $('answer').textContent = state ? state.value : '';
}

function renderStreak() {
  const el = $('streak');
  const s = state ? state.streak : 0;
  if (s >= 2) {
    el.textContent = '🔥 ' + s;
    el.className = 'streak show' + (s >= 10 ? ' hot' : s >= 5 ? ' warm' : '');
    el.style.animation = 'none';
    void el.offsetHeight;
    el.style.animation = '';
  } else {
    el.textContent = '';
    el.className = 'streak';
  }
}

function renderProgress() {
  if (config.mode === 'classic') {
    $('progress').textContent = `${Math.min(state.questionNum + 1, CLASSIC_TOTAL)}/${CLASSIC_TOTAL}`;
  } else if (config.mode === 'timed') {
    $('progress').textContent = 'Contre-la-montre';
  } else {
    const hearts = '<span class="on">' + '♥'.repeat(state.lives) + '</span><span class="off">' + '♥'.repeat(SURVIVAL_LIVES - state.lives) + '</span>';
    $('progress').innerHTML = `<span class="hearts">${hearts}</span> · ${DIFF_NAMES[currentDiff()]}`;
  }
}

function startSurvivalCountdown(q) {
  const lim = questionLimit(q);
  state.qDeadline = Date.now() + lim * 1000;
  $('timer').textContent = lim + 's';
  $('timer').classList.remove('danger');
}

function revealChain(q) {
  state.revealing = true;
  if (config.mode === 'survival') $('timer').textContent = '';
  const stepTime = CHAIN_STEP_MS[currentDiff()];
  const parts = [String(q.start), ...q.steps.map(s => `${s.sym} ${s.n}`), '= ?'];
  const fb = $('feedback');
  let i = 0;
  const show = () => {
    if (!state || state.current !== q) return;
    setCalc(parts[i]);
    if (i < parts.length - 1) {
      fb.textContent = i === 0 ? 'Départ…' : `Étape ${i}/${q.steps.length}`;
      fb.className = 'feedback info';
      i++;
      state.revealTimer = setTimeout(show, stepTime);
    } else {
      state.revealing = false;
      fb.textContent = '';
      fb.className = 'feedback';
      state.qStart = Date.now();
      if (config.mode === 'survival') startSurvivalCountdown(q);
    }
  };
  show();
}

function nextQuestion() {
  let q, tries = 0;
  do {
    q = generateQuestion(config.op, currentDiff());
    tries++;
  } while (state.asked.has(q.key) && tries < 100);
  state.asked.add(q.key);
  state.current = q;
  state.value = '';
  state.revealing = false;
  state.qStart = Date.now();
  state.qDeadline = null;

  $('calc').classList.toggle('seq', q.op === 'seq');
  renderAnswer();
  $('answer').className = '';
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  renderProgress();

  if (q.op === 'chain') {
    revealChain(q);
  } else {
    setCalc(q.op === 'seq' ? q.terms.join(', ') + ', ?' : `${q.a} ${OP_SYMBOLS[q.op]} ${q.b}`);
    if (config.mode === 'survival') startSurvivalCountdown(q);
  }
}

function updateScore() {
  $('score').textContent = `Score ${state.correct}`;
}

function formatTime(s) {
  return s.toFixed(1) + 's';
}

function startGame() {
  state = {
    correct: 0,
    attempts: 0,
    questionNum: 0,
    asked: new Set(),
    current: null,
    value: '',
    startTime: Date.now(),
    timeLeft: TIMED_DURATION,
    interval: null,
    revealTimer: null,
    locked: false,
    revealing: false,
    streak: 0,
    bestStreak: 0,
    lives: SURVIVAL_LIVES,
    diffIndex: DIFF_ORDER.indexOf(config.diff),
    perOp: {},
    qStart: 0,
    qDeadline: null,
  };

  $('setup').classList.add('hidden');
  $('end').classList.add('hidden');
  $('game').classList.remove('hidden');
  updateScore();
  renderStreak();

  const timerEl = $('timer');
  timerEl.className = 'timer';
  timerEl.textContent = '';

  if (config.mode === 'timed') {
    timerEl.textContent = TIMED_DURATION + 's';
    state.interval = setInterval(() => {
      const left = TIMED_DURATION - (Date.now() - state.startTime) / 1000;
      state.timeLeft = left;
      if (left <= 0) {
        timerEl.textContent = '0s';
        endGame();
        return;
      }
      timerEl.textContent = Math.ceil(left) + 's';
      timerEl.classList.toggle('danger', left < 10);
    }, 100);
  } else if (config.mode === 'survival') {
    state.interval = setInterval(() => {
      if (!state || !state.qDeadline || state.locked || state.revealing) return;
      const left = (state.qDeadline - Date.now()) / 1000;
      if (left <= 0) {
        timeoutAnswer();
        return;
      }
      timerEl.textContent = Math.ceil(left) + 's';
      timerEl.classList.toggle('danger', left < 3);
    }, 100);
  }

  nextQuestion();
}

function pressDigit(d) {
  if (!state || state.locked || state.revealing || !state.current) return;
  if (state.value.length >= 7) return;
  state.value += d;
  renderAnswer();
  if (state.value.length >= String(state.current.answer).length) submitAnswer();
}

function pressBackspace() {
  if (!state || state.locked || state.revealing) return;
  state.value = state.value.slice(0, -1);
  renderAnswer();
}

function finishQuestion(good, timedOut) {
  state.locked = true;
  state.qDeadline = null;

  state.attempts++;
  const dt = (Date.now() - state.qStart) / 1000;
  const po = state.perOp[state.current.op] || (state.perOp[state.current.op] = [0, 0, 0]);
  po[1]++;
  po[2] += dt;

  const fb = $('feedback');
  if (config.mode === 'survival') $('timer').textContent = '';

  if (good) {
    state.correct++;
    po[0]++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    $('answer').classList.add('correct');
    fb.textContent = 'Correct !';
    fb.className = 'feedback good';
    if (config.mode === 'survival' && state.correct % RAMP_EVERY === 0 && state.diffIndex < DIFF_ORDER.length - 1) {
      state.diffIndex++;
    }
  } else {
    state.streak = 0;
    $('answer').classList.add('wrong');
    fb.textContent = `${timedOut ? 'Temps écoulé' : 'Faux'} — la réponse était ${state.current.answer}`;
    fb.className = 'feedback bad';
    if (config.mode === 'survival') {
      state.lives--;
      renderProgress();
    }
  }
  updateScore();
  renderStreak();

  state.questionNum++;
  const delay = config.mode === 'classic' ? 1000
    : config.mode === 'timed' ? 500
    : good ? 500 : 1200;

  setTimeout(() => {
    if (!state) return;
    state.locked = false;
    if (config.mode === 'classic' && state.questionNum >= CLASSIC_TOTAL) {
      endGame();
    } else if (config.mode === 'timed' && state.timeLeft <= 0) {
      endGame();
    } else if (config.mode === 'survival' && state.lives <= 0) {
      endGame();
    } else {
      nextQuestion();
    }
  }, delay);
}

function submitAnswer() {
  if (!state || state.locked || state.revealing || state.value === '') return;
  finishQuestion(parseInt(state.value, 10) === state.current.answer, false);
}

function timeoutAnswer() {
  if (!state || state.locked || state.revealing) return;
  finishQuestion(false, true);
}

function endGame() {
  clearInterval(state.interval);
  clearTimeout(state.revealTimer);
  const elapsed = (Date.now() - state.startTime) / 1000;
  const { correct, attempts, bestStreak, perOp } = state;
  const accuracy = attempts ? Math.round((correct / attempts) * 100) : 0;

  gameHistory.push({
    d: Date.now(),
    mode: config.mode, op: config.op, diff: config.diff,
    c: correct, a: attempts, t: +elapsed.toFixed(1), bs: bestStreak, po: perOp,
  });
  gameHistory = gameHistory.slice(-300);
  lsSave(kHist(), gameHistory);
  submitScore(correct, elapsed, attempts);

  const key = `${config.mode}|${config.op}|${config.diff}`;
  let isRecord = false;

  const rows = [];
  if (config.mode === 'classic') {
    rows.push(['Score', `${correct}/${CLASSIC_TOTAL}`]);
    rows.push(['Précision', accuracy + '%']);
    rows.push(['Meilleure série', bestStreak]);
    rows.push(['Temps total', formatTime(elapsed)]);
    rows.push(['Temps moyen / question', formatTime(elapsed / CLASSIC_TOTAL)]);
    const prev = bestScores[key];
    if (!prev || correct > prev.score || (correct === prev.score && elapsed < prev.time)) {
      bestScores[key] = { score: correct, time: +elapsed.toFixed(1) };
      isRecord = true;
    }
    $('recordMsg').textContent = isRecord
      ? '🏆 Nouveau record !'
      : `Record : ${bestScores[key].score}/${CLASSIC_TOTAL} en ${formatTime(bestScores[key].time)}`;
  } else {
    rows.push(['Bonnes réponses', correct]);
    rows.push(['Précision', accuracy + '%']);
    rows.push(['Meilleure série', bestStreak]);
    if (config.mode === 'survival') rows.push(['Temps total', formatTime(elapsed)]);
    const prev = bestScores[key];
    if (!prev || correct > prev.score) {
      bestScores[key] = { score: correct };
      isRecord = true;
    }
    $('recordMsg').textContent = isRecord
      ? '🏆 Nouveau record !'
      : `Record : ${bestScores[key].score} bonnes réponses`;
  }
  lsSave(kBest(), bestScores);
  $('recordMsg').classList.toggle('new', isRecord);

  $('endStats').innerHTML = rows
    .map(([l, v]) => `<div class="stat-row"><span>${l}</span><span class="value">${v}</span></div>`)
    .join('');
  $('endTitle').textContent = config.mode === 'timed' ? 'Temps écoulé' : 'Partie terminée';
  $('endContext').textContent = `${MODE_NAMES[config.mode]} · ${OP_NAMES[config.op]} · ${DIFF_NAMES[config.diff]}`;

  state = null;
  $('game').classList.add('hidden');
  $('end').classList.remove('hidden');
}

function quitGame() {
  clearInterval(state.interval);
  clearTimeout(state.revealTimer);
  state = null;
  $('game').classList.add('hidden');
  $('setup').classList.remove('hidden');
  showStep(0);
}

// ---------- Statistiques ----------

function buildStats() {
  const body = $('statsBody');
  if (!gameHistory.length) {
    body.innerHTML = '<div class="empty-msg">Aucune partie enregistrée pour l\'instant.<br>Jouez une partie pour voir vos statistiques !</div>';
    return;
  }

  const games = gameHistory.length;
  let totalC = 0, totalA = 0, bestStreakEver = 0;
  const agg = {};
  gameHistory.forEach(h => {
    totalC += h.c;
    totalA += h.a;
    if (h.bs > bestStreakEver) bestStreakEver = h.bs;
    for (const op in (h.po || {})) {
      const [c, a, t] = h.po[op];
      const g = agg[op] || (agg[op] = { c: 0, a: 0, t: 0 });
      g.c += c; g.a += a; g.t += t;
    }
  });
  const globalAcc = totalA ? Math.round((totalC / totalA) * 100) : 0;

  let html = `
    <div class="cards">
      <div class="card"><div class="big">${games}</div><div class="lbl">Parties</div></div>
      <div class="card"><div class="big">${globalAcc}%</div><div class="lbl">Précision</div></div>
      <div class="card"><div class="big">🔥 ${bestStreakEver}</div><div class="lbl">Série max</div></div>
    </div>`;

  html += '<div class="section-lbl">Par épreuve</div>';
  ['add', 'sub', 'mul', 'div', 'chain', 'seq'].forEach(op => {
    const g = agg[op];
    if (!g || !g.a) return;
    const acc = Math.round((g.c / g.a) * 100);
    const avg = (g.t / g.a).toFixed(1);
    html += `
      <div class="op-row">
        <div class="op-head">
          <span>${OP_NAMES[op]}</span>
          <span class="meta">${acc}% · ${avg}s / question</span>
        </div>
        <div class="bar"><i style="width:${acc}%"></i></div>
      </div>`;
  });

  html += '<div class="section-lbl">Dernières parties</div>';
  gameHistory.slice(-8).reverse().forEach(h => {
    const date = new Date(h.d).toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' });
    const score = h.mode === 'classic' ? `${h.c}/${CLASSIC_TOTAL}` : `${h.c} pts`;
    html += `
      <div class="hist-row">
        <span class="what">${MODE_NAMES[h.mode]} · ${OP_NAMES[h.op]} · ${DIFF_NAMES[h.diff]}</span>
        <span class="res">${score} · ${date}</span>
      </div>`;
  });

  body.innerHTML = html;
}

// ---------- Classement ----------

const PTS_W = { easy: 1, medium: 2, hard: 4, goat: 8 };
let boardReturn = 'setup';
let generalRows = [];
let catRows = [];

function showBoardTab(t) {
  $('tabGeneral').classList.toggle('active', t === 'general');
  $('tabCat').classList.toggle('active', t === 'cat');
  $('generalPane').classList.toggle('hidden', t !== 'general');
  $('catPane').classList.toggle('hidden', t !== 'cat');
  if (t === 'general') loadGeneral($('playerSearch').value.trim());
  else loadBoard();
}

function openBoard(from) {
  boardReturn = from;
  $('setup').classList.add('hidden');
  $('end').classList.add('hidden');
  $('boardScreen').classList.remove('hidden');
  if (config.mode) $('bMode').value = config.mode;
  if (config.op) $('bOp').value = config.op;
  if (config.diff) $('bDiff').value = config.diff;
  showBoardTab(from === 'end' ? 'cat' : 'general');
}

async function loadGeneral(term) {
  const body = $('generalBody');
  generalRows = [];
  if (!supa) {
    body.innerHTML = '<div class="empty-msg">Classement indisponible hors ligne.</div>';
    return;
  }
  body.innerHTML = '<div class="empty-msg">Chargement…</div>';
  try {
    await ensureSession();
    let rows;
    if (term) {
      const clean = term.replace(/[%_]/g, '');
      const { data: profs, error: e1 } = await supa.from('profiles')
        .select('user_id,pseudo').ilike('pseudo', '%' + clean + '%').limit(15);
      if (e1) throw e1;
      if (term !== $('playerSearch').value.trim()) return;
      if (!profs.length) {
        body.innerHTML = '<div class="empty-msg">Aucun joueur trouvé.</div>';
        return;
      }
      const { data: pts, error: e2 } = await supa.from('leaderboard_general')
        .select('*').in('user_id', profs.map(p => p.user_id));
      if (e2) throw e2;
      const byId = {};
      (pts || []).forEach(r => { byId[r.user_id] = r; });
      rows = profs.map(p => byId[p.user_id] || { user_id: p.user_id, pseudo: p.pseudo, points: 0 });
      rows.sort((a, b) => b.points - a.points);
    } else {
      const { data, error } = await supa.from('leaderboard_general')
        .select('*').order('points', { ascending: false }).limit(50);
      if (error) throw error;
      rows = data;
    }
    if (term !== $('playerSearch').value.trim()) return;
    generalRows = rows;
    if (!rows.length) {
      body.innerHTML = '<div class="empty-msg">Aucun score pour l\'instant.<br>Soyez le premier !</div>';
      return;
    }
    const medals = ['🥇', '🥈', '🥉'];
    body.innerHTML = rows.map((r, i) => `
      <div class="board-row click${r.user_id === myId ? ' me' : ''}" data-i="${i}">
        <span class="rank">${term ? '·' : (medals[i] || i + 1)}</span>
        <span class="name">${esc(r.pseudo)}</span>
        <span class="pts">${r.points} pts</span>
      </div>`).join('');
  } catch {
    body.innerHTML = '<div class="empty-msg">Impossible de charger le classement général.<br>Vérifiez votre connexion.</div>';
  }
}

async function openPlayer(uid, name) {
  $('boardScreen').classList.add('hidden');
  $('playerScreen').classList.remove('hidden');
  $('playerName').textContent = name;
  $('playerSub').textContent = '';
  const body = $('playerBody');
  body.innerHTML = '<div class="empty-msg">Chargement…</div>';
  if (!supa) {
    body.innerHTML = '<div class="empty-msg">Indisponible hors ligne.</div>';
    return;
  }
  try {
    const { data: rows, error } = await supa.from('scores')
      .select('mode,op,diff,score,time_s,attempts').eq('user_id', uid).limit(1000);
    if (error) throw error;
    if (!rows.length) {
      body.innerHTML = '<div class="empty-msg">Aucune partie jouée pour l\'instant.</div>';
      return;
    }
    const bests = {};
    let totC = 0, totA = 0;
    rows.forEach(r => {
      const k = `${r.mode}|${r.op}|${r.diff}`;
      if (!bests[k] || r.score > bests[k].score) bests[k] = r;
      if (r.attempts) { totC += r.score; totA += r.attempts; }
    });
    const points = Object.values(bests).reduce((s, r) => s + r.score * PTS_W[r.diff], 0);
    try {
      const { count } = await supa.from('leaderboard_general')
        .select('user_id', { count: 'exact', head: true }).gt('points', points);
      if (count !== null && count !== undefined) {
        $('playerSub').textContent = `#${count + 1} au classement général`;
      }
    } catch {}
    const acc = totA ? Math.round((totC / totA) * 100) + '%' : '—';
    let html = `
      <div class="cards">
        <div class="card"><div class="big">${points}</div><div class="lbl">Points</div></div>
        <div class="card"><div class="big">${rows.length}</div><div class="lbl">Parties</div></div>
        <div class="card"><div class="big">${acc}</div><div class="lbl">Précision</div></div>
      </div>
      <div class="section-lbl">Records</div>`;
    html += Object.values(bests)
      .sort((a, b) => b.score * PTS_W[b.diff] - a.score * PTS_W[a.diff])
      .slice(0, 12)
      .map(r => {
        const val = r.mode === 'classic' ? `${r.score}/${CLASSIC_TOTAL}` : `${r.score} pts`;
        return `<div class="hist-row"><span class="what">${MODE_NAMES[r.mode]} · ${OP_NAMES[r.op]} · ${DIFF_NAMES[r.diff]}</span><span class="res">${val}</span></div>`;
      }).join('');
    body.innerHTML = html;
  } catch {
    body.innerHTML = '<div class="empty-msg">Impossible de charger ce joueur.</div>';
  }
}

async function loadBoard() {
  const body = $('boardBody');
  if (!supa) {
    body.innerHTML = '<div class="empty-msg">Classement indisponible hors ligne.</div>';
    return;
  }
  body.innerHTML = '<div class="empty-msg">Chargement…</div>';
  const mode = $('bMode').value, op = $('bOp').value, diff = $('bDiff').value;
  try {
    await ensureSession();
    let q = supa.from('scores').select('user_id,score,time_s,profiles(pseudo)')
      .eq('mode', mode).eq('op', op).eq('diff', diff)
      .order('score', { ascending: false });
    if (mode === 'classic') q = q.order('time_s', { ascending: true });
    const { data, error } = await q.limit(200);
    if (error) throw error;
    if (mode !== $('bMode').value || op !== $('bOp').value || diff !== $('bDiff').value) return;

    const seen = new Set();
    const top = [];
    for (const r of data) {
      if (seen.has(r.user_id)) continue;
      seen.add(r.user_id);
      top.push(r);
      if (top.length >= 20) break;
    }
    catRows = top;
    if (!top.length) {
      body.innerHTML = '<div class="empty-msg">Aucun score pour cette catégorie.<br>Soyez le premier !</div>';
      return;
    }
    const medals = ['🥇', '🥈', '🥉'];
    body.innerHTML = top.map((r, i) => {
      const pts = mode === 'classic'
        ? `${r.score}/${CLASSIC_TOTAL} · ${(r.time_s || 0).toFixed(1)}s`
        : `${r.score} pts`;
      return `<div class="board-row click${r.user_id === myId ? ' me' : ''}" data-i="${i}">
        <span class="rank">${medals[i] || (i + 1)}</span>
        <span class="name">${esc(r.profiles && r.profiles.pseudo || '—')}</span>
        <span class="pts">${pts}</span>
      </div>`;
    }).join('');
  } catch {
    body.innerHTML = '<div class="empty-msg">Impossible de charger le classement.<br>Vérifiez votre connexion.</div>';
  }
}

// ---------- Écouteurs ----------

$('quitBtn').addEventListener('click', quitGame);
$('replayBtn').addEventListener('click', startGame);
$('homeBtn').addEventListener('click', () => {
  $('end').classList.add('hidden');
  $('setup').classList.remove('hidden');
  showStep(0);
});
$('statsBtn').addEventListener('click', () => {
  buildStats();
  $('setup').classList.add('hidden');
  $('statsScreen').classList.remove('hidden');
});
$('statsBack').addEventListener('click', () => {
  $('statsScreen').classList.add('hidden');
  $('setup').classList.remove('hidden');
});
$('boardBtn').addEventListener('click', () => openBoard('setup'));
$('endBoardBtn').addEventListener('click', () => openBoard('end'));
$('boardBack').addEventListener('click', () => {
  $('boardScreen').classList.add('hidden');
  $(boardReturn).classList.remove('hidden');
});
['bMode', 'bOp', 'bDiff'].forEach(id => $(id).addEventListener('change', loadBoard));
$('tabGeneral').addEventListener('click', () => showBoardTab('general'));
$('tabCat').addEventListener('click', () => showBoardTab('cat'));

let searchTimer = null;
$('playerSearch').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadGeneral(e.target.value.trim()), 300);
});
$('generalBody').addEventListener('click', e => {
  const row = e.target.closest('.board-row');
  if (!row) return;
  const r = generalRows[+row.dataset.i];
  if (r) openPlayer(r.user_id, r.pseudo);
});
$('boardBody').addEventListener('click', e => {
  const row = e.target.closest('.board-row');
  if (!row) return;
  const r = catRows[+row.dataset.i];
  if (r) openPlayer(r.user_id, (r.profiles && r.profiles.pseudo) || '—');
});
$('playerBack').addEventListener('click', () => {
  $('playerScreen').classList.add('hidden');
  $('boardScreen').classList.remove('hidden');
});

$('profileBtn').addEventListener('click', () => {
  renderProfiles();
  $('profileMsg').textContent = '';
  $('profileMsg').className = 'feedback';
  $('setup').classList.add('hidden');
  $('profileScreen').classList.remove('hidden');
});
$('profileBack').addEventListener('click', () => {
  $('profileScreen').classList.add('hidden');
  $('setup').classList.remove('hidden');
});
$('profileList').addEventListener('click', e => {
  const btn = e.target.closest('.choice');
  if (btn) switchProfile(+btn.dataset.i);
});
$('addProfileBtn').addEventListener('click', startAddProfile);
$('pseudoCancel').addEventListener('click', cancelAddProfile);
$('pseudoBtn').addEventListener('click', savePseudo);
$('pseudoInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') savePseudo();
});

$('numpad').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  const k = btn.dataset.k;
  if (k === 'back') pressBackspace();
  else if (k === 'ok') submitAnswer();
  else pressDigit(k);
});

document.addEventListener('keydown', e => {
  if ($('game').classList.contains('hidden') || !state) return;
  if (e.key >= '0' && e.key <= '9') pressDigit(e.key);
  else if (e.key === 'Backspace') pressBackspace();
  else if (e.key === 'Enter') submitAnswer();
});

// ---------- Démarrage ----------

$('profileBtn').textContent = '👤 ' + (pseudo || 'Profil');
if (!pseudo) {
  $('setup').classList.add('hidden');
  $('pseudoScreen').classList.remove('hidden');
} else {
  loadLocalData();
  ensureSession();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
